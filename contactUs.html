<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - TastyEats</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
     :root {
        --cream: #f5eee0;
        --dark: #1e1e1a;
        --accent: #c8703a;
     }


     body {
        font-family: 'Lato', sans-serif;
        background: var(--cream);
        color: var(--dark);
     }


     /* Navbar */
     .navbar {
        background: var(--dark) !important;
        padding: 1.2rem 2rem;
     }


     .navbar-brand {
        font-family: 'Playfair Display', serif;
        font-size: 1.6rem;
        color: var(--cream) !important;
        letter-spacing: 1px;
     }


     .nav-link {
        color: #ccc !important;
        font-weight: 300;
        letter-spacing: 1.5px;
text-transform: uppercase;
        font-size: 0.85rem;
        margin: 0 0.5rem;
        transition: color 0.2s;
     }


     .nav-link:hover,
     .nav-link.active {
        color: var(--accent) !important;
     }


     /* Page Header */
     .page-header {
        padding: 4rem 2rem 2rem;
        text-align: center;
        background: linear-gradient(135deg, rgba(200, 112, 58, 0.08) 0%, rgba(200, 112, 58, 0.03) 100%);
     }


     .page-header h1 {
        font-family: 'Playfair Display', serif;
        font-size: 3rem;
        margin-bottom: 1rem;
        font-weight: 700;
     }


     .page-header p {
        font-size: 1.1rem;
        color: #666;
        font-weight: 300;
        letter-spacing: 1px;
     }


     .divider {
        width: 50px;
        height: 3px;
        background: var(--accent);
        margin: 1.5rem auto;
     }


     /* Contact Form Container */
     .contact-container {
        max-width: 700px;


        margin: 0 auto;
        padding: 4rem 2rem;
     }


     .form-group {
        margin-bottom: 2rem;
     }


     .form-label {
        font-family: 'Playfair Display', serif;
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--dark);
        margin-bottom: 0.7rem;
        display: block;
        letter-spacing: 0.5px;
     }


     .form-input,
     .form-textarea {
        width: 100%;
        padding: 1rem;
        border: 2px solid #e0d5c7;
        border-radius: 6px;
        font-family: 'Lato', sans-serif;
        font-size: 1rem;
        color: var(--dark);
        background: white;
        transition: border-color 0.3s ease, box-shadow 0.3s ease;
        box-sizing: border-box;
     }


     .form-input:focus,
     .form-textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(200, 112, 58, 0.1);
     }


     .form-textarea {
        resize: vertical;
        min-height: 180px;
        font-weight: 300;
}


     /* Two Column Layout for Names */
     .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
     }


     /* Submit Button */
     .submit-button {
        background: var(--accent);
        color: white;
        border: none;
        padding: 1rem 2rem;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.3s ease, transform 0.2s ease;
        width: 100%;
        margin-top: 1rem;
     }


     .submit-button:hover {
        background: #a65a2e;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(200, 112, 58, 0.3);
     }


     .submit-button:active {
        transform: translateY(0);
     }


     /* Footer */
     footer {
        background: var(--dark);
        color: #aaa;
        text-align: center;
        padding: 2rem;
        font-size: 0.85rem;
 font-weight: 300;
        letter-spacing: 1px;
        margin-top: 4rem;
     }


     /* Responsive */
     @media (max-width: 768px) {
        .page-header h1 {
           font-size: 2rem;
        }


        .form-row {
           grid-template-columns: 1fr;
           gap: 1.5rem;
        }


        .contact-container {
           padding: 2rem 1.5rem;
        }
     }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
     <div class="container-fluid">
        <a class="navbar-brand" href="index.html">TastyEats</a>
        <button class="navbar-toggler" type="button"
           data-bs-toggle="collapse" data-bs-target="#mainNav"
           aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
           <span class="navbar-toggler-icon" style="filter:invert(1)"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="mainNav">
           <ul class="navbar-nav">
              <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
              <li class="nav-item"><a class="nav-link" href="recipes.html">Recipes</a></li>
              <li class="nav-item"><a class="nav-link active" href="contactUs.html">Contact Us</a></li>
</ul>
        </div>
     </div>
  </nav>


  <div class="page-header">
     <h1>Contact Us</h1>
     <div class="divider"></div>
     <p>We'd love to hear from you. Send us a message!</p>
  </div>


  <div class="contact-container">
     <form id="contactForm">
        <!-- First Name and Last Name Row -->
        <div class="form-row">
           <div class="form-group">
              <label for="firstName" class="form-label">First Name</label>
              <input type="text" id="firstName" name="firstName" class="form-input" required>
           </div>
           <div class="form-group">
              <label for="lastName" class="form-label">Last Name</label>
              <input type="text" id="lastName" name="lastName" class="form-input" required>
           </div>
        </div>


        <!-- Email -->
        <div class="form-group">
           <label for="email" class="form-label">Email ID</label>
           <input type="email" id="email" name="email" class="form-input" required>
        </div>


        <!-- Subject -->
        <div class="form-group">
           <label for="subject" class="form-label">Subject</label>
           <input type="text" id="subject" name="subject" class="form-input" required>
        </div>
 <!-- Message -->
        <div class="form-group">
           <label for="message" class="form-label">Message</label>
           <textarea id="message" name="message" class="form-textarea" required></textarea>
        </div>


        <!-- Submit Button -->
        <button type="submit" class="submit-button">Send Us a Message</button>
     </form>
  </div>


  <footer>
     <p>&copy; 2026 TastyEats. All rights reserved.</p>
  </footer>


  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
